# Configuration for motion-based Hesai <-> Livox extrinsic calibration.
# Edit topic names to match your actual recording, then pass --config config.yaml.

bag:
  # ROS 2 point cloud topics recorded on the rig (sensor_msgs/PointCloud2).
  hesai_topic: /lidar_points        # HESAI JT128 (reference), confirmed on rig
  livox_topic: /livox/lidar         # Livox Avia PointCloud2, confirmed on rig
  # ROS 2 distro the bag was recorded with (selects the rosbags typestore used to
  # deserialize messages). Supported: dashing, eloquent, foxy, galactic, humble,
  # iron, jazzy, kilted, lyrical. The rig records under Humble.
  ros_distro: humble
  # Which clock to timestamp each scan with when building the trajectories.
  # Run inspect_bag_timing.py first to decide which to trust:
  #   header         -> raw driver header.stamp. Best ONLY if both LiDAR drivers
  #                     stamp on the same synced clock (PTP/PPS). Fails if the two
  #                     sensors use different header epochs.
  #   header_aligned -> each sensor's (clean, low-jitter) header spacing, shifted
  #                     onto the shared recorder epoch by the robust median offset.
  #                     Best when each header is clean but the two sensors do NOT
  #                     share a clock (different epochs) -- this rig's case.
  #                     Requires header.stamp to be populated.
  #   bag_receive    -> the recorder's write clock (one clock for both topics).
  #                     Robust fallback if header.stamp is missing/zero, but carries
  #                     the recorder's arrival jitter into the timeline.
  timestamp_source: header_aligned

odometry:
  # KISS-ICP runs once per topic. These defaults suit indoor/handheld mapping.
  deskew: true
  max_range: 60.0                   # m  (Hesai short range; clip Livox the same way)
  min_range: 0.5                    # m
  voxel_size: 0.5                   # m  (downsampling; 0.3-1.0 typical)

pairing:
  stride: 5                         # compare frames N apart for larger motions (10 Hz -> 0.5 s)
  min_angle_deg: 3.0                # discard near-pure-translation pairs (ill-conditioned)
  min_observability: 0.10           # warn if stacked rotation axes are near-degenerate

reference_frame: lidar_hesai        # Hesai is the fixed reference; we refine base_link->livox
child_frame: lidar_livox_avia

paths:
  # Defaults; override on the command line as needed.
  initial_extrinsics: ../../ros2_ws/src/mmb_bringup/config/extrinsics_initial.yaml
  output_extrinsics: ../../ros2_ws/src/mmb_bringup/config/extrinsics_calibrated.yaml
