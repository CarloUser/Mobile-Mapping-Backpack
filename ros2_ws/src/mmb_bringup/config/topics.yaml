# Topics recorded by recording.launch.py / bash/record_all.sh.
# recording.launch.py reads this file at launch time — this is the single
# source of truth; do not duplicate the list elsewhere.
# Estimated aggregate bandwidth at full rate: ~1.5-2 GB/min.

topics:
  # LiDARs
  - /lidar_points                         # HESAI JT128 PointCloud2, ~10 Hz
  - /lidar_imu                            # HESAI built-in IMU, ~420 Hz (used by lidar_lidar calib)
  - /livox/lidar                          # Livox Avia, livox_interfaces/CustomMsg (per-point time; FAST-LIO needs this format)
  - /livox/imu                            # Livox Avia IMU, ~200 Hz

  # OAK-4D Luxonis (front) — RGB only
  - /oak4d/rgb/image_raw                  # Image, 30 Hz
  - /oak4d/rgb/camera_info
  - /oak4d/imu/data                       # Imu, ~500 Hz

  # OAK-D Lite Luxonis (rear) — RGB only
  - /oakd_lite/rgb/image_raw              # Image, 30 Hz
  - /oakd_lite/rgb/camera_info

  # OAK-1 Luxonis (rear, single RGB — no depth)
  - /oak1/rgb/image_raw                   # Image, 30 Hz
  - /oak1/rgb/camera_info

  # Intel RealSense (rear) — RGB (color) only
  - /realsense/color/image_raw            # Image, 30 Hz
  - /realsense/color/camera_info

  # Insta360 (omni hub camera) — driver publishes H.264-compressed dual
  # fisheye; record the compressed stream and decode offline with the
  # driver's `decoder` / `equirectangular` nodes when processing.
  - /dual_fisheye/image/compressed
  - /imu/data_raw                         # Insta360 6-DOF IMU (pre-Madgwick filter)

  # Xsens MTi-610R IMU
  - /imu/data                             # Imu, 400 Hz
  - /imu/mag                              # MagneticField, 100 Hz

  # u-blox GNSS
  - /gnss/fix                             # NavSatFix, 5-10 Hz
  - /gnss/fix_velocity                    # TwistWithCovarianceStamped

  # TF tree — essential for extrinsic calibration replay
  - /tf
  - /tf_static

# Bandwidth reduction options (uncomment in place of the *_raw topics if
# storage is the bottleneck). Depth images do not compress well; keep raw.
#   - /oak4d/rgb/image_raw/compressed
#   - /oakd_lite/rgb/image_raw/compressed
#   - /realsense/color/image_raw/compressed
